<dialog #dlg appDialogWindow [open]="open" [dialogId]="cardId" [id]="id" (openChange)="openChange.emit($event)" class="ew-dialog">
  <div class="ew-card">
    <header class="ew-header">
      <h3 id="ew-title" class="m-0">Edit {{cardId}}</h3>
      <button type="button" class="btn" aria-label="Close" (click)="close()">
        <i class="bi bi-x-lg"></i>
      </button>
    </header>

    <div class="ew-body">
      <form (ngSubmit)="onSubmit()">
        <mat-form-field class="mb-3 w-100 gap-2 form-control">
          <mat-label for="name-input" class="form-label">{{TextStringsUtil.DialogEditCardInputNameTitle}}</mat-label>
          <input 
            type="text" 
            matInput
            id="name-input"
            class="form-control" 
            placeholder="Enter name"
            name="name"
            [(ngModel)]="facade.card.name"
            required>
        </mat-form-field>

        <mat-form-field class="mb-3 w-100 gap-2 form-control">
          <mat-label for="url-input" class="form-label">{{TextStringsUtil.DialogEditCardInputUrlTitle}}</mat-label>
          <input 
            matInput
            type="text" 
            id="url-input"
            class="form-control" 
            [(ngModel)]="facade.card.url"
            placeholder="Enter URL"
            name="url"
            required>
        </mat-form-field>

        <mat-form-field class="mb-3 w-100 gap-2 form-control">
          <mat-label>{{TextStringsUtil.DialogEditCardInputSearchIconTitle}}</mat-label>
        <div class="d-flex">
          <input 
            matInput
            type="text"
            #iconInput
            (input)="facade.onSearch(iconInput.value)" 
            placeholder="Enter Icon name"
            name="icon">
          <button matSuffix id="dropDownButton" (click)="dropDown.open();$event.stopPropagation()" type="button">
            <mat-icon>arrow_drop_down</mat-icon>
          </button>
        </div>
          <div class="d-flex">
            <mat-select #dropDown [value]="facade.card.iconData?.materialIcon" (selectionChange)="facade.setIcon($event.value)">             
              @if (facade.icons$ | async; as icons)
              {
                @for (icon of icons.icons; track icon) {
                  <mat-option [value]="icon"><mat-icon>{{icon}}</mat-icon></mat-option>
                }
              }
            </mat-select>
          </div>
        </mat-form-field>
        <!--
        <div class="mb-3">
          <label for="icon-select" class="form-label">{{TextStringsUtil.ModalEditComponentLinkToImageTitle}}</label>
          <select 
            id="icon-select"
            class="form-select" 
            name="icon">
            [(ngModel)]="this.modalModel.selectedDropDownValue" placeholder="Select option"
            (selectionChange)="this.ResetImageInput()">         
            <option [value]="1"> title one </option>
            <option [value]="2"> title two</option>
           @for(icon of icons; track icon.id) {
              <option [value]="icon.id">{{ icon.name }}</option>
            }
          </select>
        </div>
        -->
        <!--TODO  [hidden]="this.modalModel.selectedDropDownValue != 1"
        <div class="mb-3" >
          <label> </label>
            <input placeholder="Icon" type="file" id="formFile" #fileInput (change)="onFileUpload($event)"/>  
        </div>
-->
        <!--TODO  [hidden]="this.modalModel.selectedDropDownValue != 2"
        <div class="mb-3">
          <input />
        </div>
-->
        <div class="d-flex justify-content-end gap-2 mt-4">
          <button type="button" class="btn btn-secondary" (click)="close()">{{TextStringsUtil.DialogEditCardCancelBtnTitle}}</button>
          <button type="submit" class="btn btn-primary">{{TextStringsUtil.DialogEditCardAcceptBtnTitle}}</button>
        </div>
      </form>
    </div>
  </div>
</dialog>
