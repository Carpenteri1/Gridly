<dialog #dlg appDialogWindow [open]="open" class="aw-dialog" aria-labelledby="aw-title">
  <div class="aw-card">
    <header class="aw-header">
      <h5 id="aw-title" class="m-0">{{ TextStringsUtil.AddCardTitle }}</h5>
      <button type="button" class="btn" aria-label="Close" (click)="close()">
        <i class="bi bi-x-lg"></i>
      </button>
    </header>

    <div class="aw-body">
      <p class="text-muted mb-3">{{ TextStringsUtil.AddCardDescription }}</p>
      <div class="row row-cols-1 row-cols-sm-2 g-3 py-2">
        @for(cardOption of cardOptions; track cardOption.type){
          <div class="col">
            <button type="button"
                    class="btn btn-outline-secondary w-100 h-100 d-flex flex-column align-items-center gap-2 p-4 option-btn"
                    (click)="onSelect(cardOption.type)">
              <i [class]="cardOption.icon + ' option-icon'"></i>
              <div class="text-center">
                <div class="fw-semibold">{{ cardOption.label }}</div>
                <div class="text-muted small">{{ cardOption.description }}</div>
              </div>
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</dialog>
