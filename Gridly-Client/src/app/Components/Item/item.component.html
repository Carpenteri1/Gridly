<div class="row h-10">
  @if( componentService.InEditMode)
  {
      <div class="col">
        <button type="button" 
        (click)="OpenEditModal(id)" 
        class="btn edit-button start-50" style="margin-left: 0.5em;">
          <i class="bi bi-pencil-square" ></i>
        </button>
      </div>
      <div class="col">
        <button
          cdkDragHandle
          class="btn edit-button" style="margin-left: 0.5em;">
          <i class="bi bi-arrows-move"></i>
        </button>
      </div>
      <div class="col d-flex justify-content-end">
        <button
        (click)="OpenDeleteModal(id)" 
          class="btn edit-button">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <div class="col d-flex justify-content-end">
        <button
        makeResizable
        [canResize]="componentService.InEditMode"
        [targetId]="id"
        type="button"
        class="btn edit-button resize-button">
        <i class="bi bi-arrows-angle-expand"></i>
      </button>
      </div>

  }
</div>
      <a class="d-flex flex-column text-decoration-none justify-content-center text-white-50 h-75 text-center pt-2">
        <span>
          <mat-icon class="component-mat-icon-size">
            {{CurrentComponent?.iconData?.materialIcon}}
          </mat-icon>
        </span>
        <p>{{CurrentComponent?.id}}</p>
        <h5 class="fw-bold">{{TextStringsUtil.EmptyWidgetTitle}}</h5>
        <p [hidden]="CurrentComponent?.componentSettings?.titleHidden" class="text-center" >{{CurrentComponent?.name}}</p>
      </a>
  <edit-widget-modal 
    [open]="isEditModalOpen"
    [modalId]="id"
    [id]="id"
    (editWidget)="handleSubmit($event)"
    (openChange)="handleModalChange($event)">
  </edit-widget-modal>
  <prompt-modal
    [open]="isDeleteModalOpen"
    [modalId]="id"
    [id]="id"
    (deleteWidget)="handleSubmit($event)"
    (openChange)="handleModalChange($event)">
  </prompt-modal>
