@if (CurrentComponentId === id){
  <div class="item-layout">
    <button [hidden]="!componentService.InEditMode" (click)="modalService.GetModalType(SetModalComponentFormData({type: FormType.Edit, component: componentService.GetComponentById(id)}))" class="btn btn-dark m-1">...</button>
    <button (click)="modalService.GetModalType(SetModalComponentFormData({type: FormType.Delete, component: componentService.GetComponentById(id)}))" class="btn btn-dark m-1"><i class="bi bi-x-lg"></i></button>
  </div>
  <a [style]="componentService.InResizeMode ? 'cursor:none;':'cursor:auto;'" [href]="componentService.InResizeMode ? null : componentService.Component.url" class="d-flex flex-column text-decoration-none justify-content-center text-white-50 h-75" target="_blank">
    <img *ngIf="componentService.IconUrlSet(componentService.Component)" [src]="componentService.Component.iconUrl" class="p-3 icon-size item-icon-center" alt="{{TextStringsUtil.GridComponentIconNotFoundMessage}}">
    <img *ngIf="componentService.IconDataSet(componentService.Component)" [src]="IconFilePath(componentService.Component)" class="p-3 icon-size item-icon-center" alt="{{TextStringsUtil.GridComponentIconNotFoundMessage}}">
    <p [hidden]="componentService.Component.componentSettings?.titleHidden" class="text-center" >{{componentService.Component.name}}</p>
   <!--TODO fix for test data
    <p class="text-center">The ID {{CurrentComponentId}}</p>
    -->
  </a>
}
