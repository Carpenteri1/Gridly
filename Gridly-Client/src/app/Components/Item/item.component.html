<div class="row h-10">
  @if (inEditMode())
  {
      <div class="col">
        <button type="button" 
        (click)="openEditDialog()" 
        class="btn edit-button start-50" style="margin-left: 0.5em;">
          <i class="bi bi-pencil-square" ></i>
        </button>
      </div>
      <div class="col">
        <button
          cdkDragHandle
          class="btn edit-button" style="margin-left: 0.5em;">
          <i class="bi bi-arrows-move"></i>
        </button>
      </div>
      <div class="col d-flex justify-content-end">
        <button
        (click)="openDeleteDialog()" 
          class="btn edit-button">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
      <div class="col d-flex justify-content-end">
        <button
        appMakeResizable
        [canResize]="inEditMode()"
        [targetId]="component.id"
        type="button"
        class="btn edit-button resize-button">
        <i class="bi bi-arrows-angle-expand"></i>
      </button>
      </div>

  }
</div>
      <a
        class="d-flex flex-column text-decoration-none justify-content-center text-white-50 h-75 text-center pt-2"
        [href]="component.url"
        target="_blank"
        rel="noreferrer">
        <span>
          @if (hasMaterialIcon(component)) {
          <mat-icon class="component-mat-icon-size">
            {{component.iconData?.materialIcon}}
          </mat-icon>
          } @else if (hasIconUrl(component)) {
            <img [src]="component.iconUrl" [alt]="component.name" class="img-fluid mx-auto" />
          } @else if (hasFileIcon(component)) {
            <img [src]="iconDataUrl(component)" [alt]="component.name" class="img-fluid mx-auto" />
          }
        </span>
        <p>{{component.id}}</p>
        <h5 [hidden]="component.componentSettings?.titleHidden" class="fw-bold">{{component.name || TextStringsUtil.EmptyWidgetTitle}}</h5>
        <p class="text-center">{{component.url}}</p>
      </a>
  <app-edit-widget-modal
    [open]="isEditModalOpen"
    [modalId]="component.id"
    [id]="component.id"
    [component]="component"
    (editedComponent)="edit($event)"
    (openChange)="handleModalChange($event)">
  </app-edit-widget-modal>
  <app-prompt-modal
    [open]="isDeleteModalOpen"
    [modalId]="component.id"
    [id]="component.id"
    (remove)="remove(component.id)"
    (openChange)="handleModalChange($event)">
  </app-prompt-modal>
