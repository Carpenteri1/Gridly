<h2 mat-dialog-title>{{ this.modalModel.title }}</h2>
<mat-dialog-content>
  <div *ngIf="modalModel.formType === ModalFormType.Add">
    <label class="hmr-label">Select option</label>

    <div class="hmr-select">
      <select
        [(ngModel)]="this.modalModel.selectedDropDownValue"
        (change)="this.ResetImageInput()"
        aria-label="Select option">
        <option [ngValue]="1">{{ this.modalModel.dropDownTitleOne }}</option>
        <option [ngValue]="2">{{ this.modalModel.dropDownTitleTwo }}</option>
      </select>
      <svg class="hmr-chevron" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>

  <div *ngIf="modalModel.formType === ModalFormType.Add && modalModel.selectedDropDownValue === 1">
    <label class="hmr-label">Icon</label>
    <div class="hmr-select" style="padding: 8px;">
      <input type="file" id="formFile" #fileInput (change)="this.OnFileUpload($event)" />
    </div>
  </div>

  <div *ngIf="modalModel.formType === ModalFormType.Add && modalModel.selectedDropDownValue === 2">
    <label class="hmr-label">{{ this.modalModel.linkToImageTitle }}</label>
    <div class="hmr-select" style="padding: 2px;">
      <input matInput [(ngModel)]="this.modalModel.component.iconUrl" />
    </div>
  </div>

</mat-dialog-content>

<mat-dialog-actions>
  <!-- TODO  buttons -->
</mat-dialog-actions>
