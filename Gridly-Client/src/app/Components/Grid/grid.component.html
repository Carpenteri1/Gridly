@if (components$ | async; as components) {
  <div class="grid-layout" cdkDropList cdkDropListOrientation="horizontal" [cdkDropListData]="components" (cdkDropListDropped)="Drop($event)">
    @for(card of components; track card.id) {
    <div class="shadow-sm grid-item-style" cdkDrag [cdkDragDisabled]="!inEditMode()" [id]="card.id.toString()">
      <app-card-component [card]="card"></app-card-component>
    </div>
    }
  </div>
}
