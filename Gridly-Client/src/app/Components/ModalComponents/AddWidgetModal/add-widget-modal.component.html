<dialog #dlg class="aw-dialog" (click)="onBackdropClick($event)" aria-labelledby="aw-title">
  <div class="aw-card" (click)="$event.stopPropagation()">
    <header class="aw-header">
      <h5 id="aw-title" class="m-0">{{ TextStringsUtil.AddWidgetTitle }}</h5>
      <button type="button" class="btn" aria-label="Close" (click)="close()">
        <i class="bi bi-x-lg"></i>
      </button>
    </header>

    <div class="aw-body">
      <p class="text-muted mb-3">{{ TextStringsUtil.AddWidgetDescription }}</p>
      <div class="row row-cols-1 row-cols-sm-2 g-3 py-2">
        @for(w of widgetOptions; track w.type){
          <div class="col">
            <button type="button"
                    class="btn btn-outline-secondary w-100 h-100 d-flex flex-column align-items-center gap-2 p-4 option-btn"
                    (click)="onSelect(w.type)">
              <i [class]="w.icon + ' option-icon'"></i>
              <div class="text-center">
                <div class="fw-semibold">{{ w.label }}</div>
                <div class="text-muted small">{{ w.description }}</div>
              </div>
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</dialog>
