<dialog #dlg modalWindow [open]="open" [modalId]="modalId" [id]="id" (openChange)="openChange.emit($event)" class="ew-dialog" (click)="modalDirective?.onBackdropClick($event)">
  <div class="ew-card" (click)="$event.stopPropagation()">
    <header class="ew-header">
      <h3 id="ew-title" class="m-0">Edit {{modalId}}</h3>
      <button type="button" class="btn" aria-label="Close" (click)="close()">
        <i class="bi bi-x-lg"></i>
      </button>
    </header>

    <div class="ew-body">
      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label for="name-input" class="form-label">{{TextStringsUtil.ModalEditComponentInputNameTitle}}</label>
          <input 
            type="text" 
            id="name-input"
            class="form-control" 
            placeholder="Enter name"
            name="name"
            [(ngModel)]="componentData.name"
            required>
        </div>

        <div class="mb-3">
          <label for="url-input" class="form-label">{{TextStringsUtil.ModalEditComponentInputUrlTitle}}</label>
          <input 
            type="text" 
            id="url-input"
            class="form-control" 
            [(ngModel)]="componentData.url"
            placeholder="Enter URL"
            name="url"
            required>
        </div>
        
        <div class="mb-3">
          <label for="icon-input" class="form-label">{{TextStringsUtil.ModalEditComponentInputSearchIconTitle}}</label>
            <div class="d-flex flex-row">
              <input type="text"
                #iconInput
                (input)="onSearch(iconInput.value)" 
                id="icon-input"
                class="form-control" 
                placeholder="Enter Icon name"
                name="icon">
              <select>
                @if (icons$ | async; as icons)
                {
                  @for (icon of icons.icons; track icon) {
                    <option [value]="icon">{{icon}}</option>
                  }
                }
              </select>
            </div>
        </div>

        <!--
        <div class="mb-3">
          <label for="icon-select" class="form-label">{{TextStringsUtil.ModalEditComponentLinkToImageTitle}}</label>
          <select 
            id="icon-select"
            class="form-select" 
            name="icon">
            [(ngModel)]="this.modalModel.selectedDropDownValue" placeholder="Select option"
            (selectionChange)="this.ResetImageInput()">         
            <option [value]="1"> title one </option>
            <option [value]="2"> title two</option>
           @for(icon of icons; track icon.id) {
              <option [value]="icon.id">{{ icon.name }}</option>
            }
          </select>
        </div>
        -->
        <!--TODO  [hidden]="this.modalModel.selectedDropDownValue != 1"
        <div class="mb-3" >
          <label> </label>
            <input placeholder="Icon" type="file" id="formFile" #fileInput (change)="onFileUpload($event)"/>  
        </div>
-->
        <!--TODO  [hidden]="this.modalModel.selectedDropDownValue != 2"
        <div class="mb-3">
          <input />
        </div>
-->
        <div class="d-flex justify-content-end gap-2 mt-4">
          <button type="button" class="btn btn-secondary" (click)="close()">{{TextStringsUtil.ModalEditComponentCancelBtnTitle}}</button>
          <button type="submit" class="btn btn-primary">{{TextStringsUtil.ModalEditComponentAcceptBtnTitle}}</button>
        </div>
      </form>
    </div>
  </div>
</dialog>
