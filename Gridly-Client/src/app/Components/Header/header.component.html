<header class="sticky-top bg-body border-bottom backdrop">
  <nav class="navbar navbar-expand-lg container py-2">
    <div class="d-flex align-items-center me-3">
      <div class="logo-box me-2">
        <i class="bi bi-grid text-white fs-5"></i>
      </div>
      <h1 class="h4 fw-bold gradient-text m-0">Gridly</h1>
    </div>

    <button class="navbar-toggler" type="button" (click)="onToggleMenu()" aria-controls="mainNavbar"
            [attr.aria-expanded]="showMenu" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="navbar-collapse collapse justify-content-end" [class.show]="showMenu" id="mainNavbar">
      <ul class="navbar-nav align-items-lg-center gap-2 ms-lg-3">

        <ng-container *ngIf="isEditMode">
          <li class="nav-item">
            <button class="btn btn-outline-primary btn-sm d-flex align-items-center gap-1"
                    (click)="onAddWidget()">
              <i class="bi bi-plus-lg"></i>
              <span>Add Widget</span>
            </button>
          </li>

          <li class="nav-item">
            <button class="btn btn-primary btn-sm d-flex align-items-center gap-1"
                    (click)="onSave()">
              <i class="bi bi-save"></i>
              <span>Save</span>
            </button>
          </li>
        </ng-container>

        <li class="nav-item">
          <button class="btn btn-sm d-flex align-items-center gap-1"
                  [ngClass]="isEditMode ? 'btn-primary' : 'btn-outline-secondary'"
                  (click)="onToggleEdit()">
            <i class="bi bi-pencil"></i>
            <span>{{ isEditMode ? 'Exit Edit' : 'Edit' }}</span>
          </button>
        </li>

        <li class="nav-item">
          <button class="btn btn-dark btn-sm" title="Toggle theme">🌓</button>
        </li>
      </ul>
    </div>
  </nav>
</header>
