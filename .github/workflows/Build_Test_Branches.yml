name: Build Test

on:
  push:
    branches:   
    - '*'
  pull_request:
    branches:
    - '*'
    types:
    - open

jobs:
  build:
    runs-on: ubuntu-latest
  
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Restore packages
      uses: npm install

    - name: Build Client
      uses: ng build
      
    - name: Restore dependencies
      run: dotnet restore

    - name: Build Api
      run: dotnet build --configuration Release

    #- name: Run tests
    #  run: dotnet test --configuration Release
