name: Build Test

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      ANGULAR_PATH: Gridly-Client
      DOTNET_PATH: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Gridly-Client/package-lock.json

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install Angular dependencies
        run: npm ci
        working-directory: Gridly-Client

      - name: Build Angular
        run: npm run build
        working-directory: Gridly-Client

      - name: Test Angular
        run: npm run test -- --watch=false --browsers=ChromeHeadless
        working-directory: Gridly-Client

      - name: Restore .NET dependencies
        run: dotnet restore
        working-directory: ${{ env.DOTNET_PATH }}

      - name: Build .NET
        run: dotnet build --configuration Release --no-restore
        working-directory: ${{ env.DOTNET_PATH }}

      - name: Test .NET
        run: dotnet test --configuration Release --no-build
        working-directory: ${{ env.DOTNET_PATH }}
